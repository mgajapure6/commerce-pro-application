<div class="min-h-screen bg-gray-50/50 p-4 sm:p-6 lg:p-8 flex items-center justify-center">
  <div class="max-w-[520px] w-full space-y-6">
    <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
      <h1 class="text-2xl font-bold text-gray-900">Admin Sign In</h1>
      <p class="text-gray-500 mt-1 text-sm">Authenticate with your identity credentials to continue.</p>
    </div>

    <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm space-y-4">
      <div>
        <label class="text-sm font-medium text-gray-700">Username</label>
        <input class="mt-1 w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm" [ngModel]="username()" (ngModelChange)="username.set($event)" placeholder="superadmin" />
      </div>

      <div>
        <label class="text-sm font-medium text-gray-700">Password</label>
        <input type="password" class="mt-1 w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm" [ngModel]="password()" (ngModelChange)="password.set($event)" placeholder="••••••••" />
      </div>

      <div>
        <label class="text-sm font-medium text-gray-700">MFA Code (optional)</label>
        <input class="mt-1 w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm" [ngModel]="mfaCode()" (ngModelChange)="mfaCode.set($event)" placeholder="123456" />
      </div>

      @if (errorMessage()) {
        <div class="px-3 py-2 rounded-xl bg-red-100 text-red-700 text-sm">{{ errorMessage() }}</div>
      }

      <button (click)="submit()" [disabled]="isLoading()" class="w-full px-4 py-2.5 bg-indigo-600 text-white rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 disabled:opacity-50 text-sm font-medium">
        {{ isLoading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </div>
  </div>
</div>
