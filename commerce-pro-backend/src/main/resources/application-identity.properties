# ===========================================
# CommercePro SuperAdmin Configuration
# ===========================================

# Default Credentials
commercepro.superadmin.default-credentials.enabled=true
commercepro.superadmin.default-credentials.username=superadmin
commercepro.superadmin.default-credentials.email=superadmin@commercepro.local
commercepro.superadmin.default-credentials.password=${SUPERADMIN_PASSWORD:ChangeMe123!}
commercepro.superadmin.default-credentials.force-password-change-on-first-login=true

# Security Policy
commercepro.superadmin.security-policy.require-mfa=false
commercepro.superadmin.security-policy.session-timeout-minutes=30
commercepro.superadmin.security-policy.max-concurrent-sessions=3
commercepro.superadmin.security-policy.restrict-to-localhost-in-dev=true
commercepro.superadmin.security-policy.audit-all-actions=true
commercepro.superadmin.security-policy.notify-on-sensitive-changes=true

# Sensitive Permissions (comma-separated list)
commercepro.superadmin.security-policy.sensitive-permissions=identity:user:delete,identity:role:delete,identity:permission:system-modify,identity:user:impersonate

# Configuration Management
commercepro.superadmin.configuration-management.can-modify-system-permissions=true
commercepro.superadmin.configuration-management.can-delete-system-roles=false
commercepro.superadmin.configuration-management.can-modify-own-role=false
commercepro.superadmin.configuration-management.can-assign-super-admin=true
commercepro.superadmin.configuration-management.min-super-admins=1
commercepro.superadmin.configuration-management.allow-remote-config-reload=true

# UI Customization
commercepro.superadmin.ui-customization.theme=dark
commercepro.superadmin.ui-customization.show-system-debug-info=true
commercepro.superadmin.ui-customization.enable-raw-query-mode=false

# Dashboard Widgets (indexed properties)
commercepro.superadmin.ui-customization.dashboard-widgets[0]=user-stats
commercepro.superadmin.ui-customization.dashboard-widgets[1]=security-alerts
commercepro.superadmin.ui-customization.dashboard-widgets[2]=audit-summary
commercepro.superadmin.ui-customization.dashboard-widgets[3]=system-health
commercepro.superadmin.ui-customization.dashboard-widgets[4]=permission-matrix

# Custom Links
commercepro.superadmin.ui-customization.custom-links.documentation=https://docs.commercepro.com
commercepro.superadmin.ui-customization.custom-links.support=https://support.commercepro.com

# ===========================================
# Role Hierarchy Configuration
# ===========================================

commercepro.roles.hierarchy-rules.max-depth=5
commercepro.roles.hierarchy-rules.allow-multiple-parents=true
commercepro.roles.hierarchy-rules.enforce-acyclic=true

# Immutable System Roles (indexed)
commercepro.roles.hierarchy-rules.immutable-system-roles[0]=SUPER_ADMIN

# ===========================================
# JWT Configuration
# ===========================================

app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-must-be-at-least-32-characters-long}
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# =============================================
# MFA Secret Encryption
# =============================================
# IMPORTANT: Change this in production! Set MFA_ENCRYPTION_KEY environment variable.
# Generate a strong key: openssl rand -base64 32
app.mfa.encryption-key=${MFA_ENCRYPTION_KEY:change-this-mfa-key-in-production-min32chars!}
