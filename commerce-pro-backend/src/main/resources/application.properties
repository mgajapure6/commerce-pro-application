spring.application.name=commerce-pro-backend

# =============================================
# Server Configuration
# =============================================
server.port=8080
server.servlet.context-path=/api

# =============================================
# H2 Database Configuration
# =============================================
spring.datasource.url=jdbc:h2:file:./data/commerce-pro-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin

# H2 Console (for development/debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# =============================================
# JPA / Hibernate Configuration
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Connection Pool (HikariCP - default in Spring Boot)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# =============================================
# Logging Configuration
# =============================================
logging.level.org.springframework=INFO
logging.level.com.commerce=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# =============================================
# Jackson Configuration
# =============================================
spring.jackson.serialization.indent-output=true
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# =============================================
# Validation Messages
# =============================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# =============================================
# Actuator (Health Checks)
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# =============================================
# File Upload Configuration
# =============================================
# Enable multipart uploads
spring.servlet.multipart.enabled=true
# Max file size (10MB)
spring.servlet.multipart.max-file-size=10MB
# Max request size (50MB)
spring.servlet.multipart.max-request-size=50MB
# Threshold after which files are written to disk
spring.servlet.multipart.file-size-threshold=2KB

# File storage path
app.file.upload-dir=./uploads
app.file.access-url=/uploads

# =============================================
# CORS Configuration
# =============================================
# Comma-separated list of allowed origins
cors.allowed-origins=http://localhost:4200,http://localhost:3000

# =============================================
# E-commerce Specific
# =============================================
# Pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# =============================================
# Development Profile Specific
# =============================================
# Set to 'true' for development to see detailed error messages
app.debug=false

# Default admin credentials (change in production!)
app.admin.username=admin
app.admin.password=admin

# =============================================
# Active Profile Specific
# =============================================
spring.profiles.active=dev
